<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOX CONTROL | Gerenciador Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0f172a; --accent: #fbbf24; --bg: #f1f5f9; 
            --card-bg: #ffffff; --text: #1e293b; --success: #10b981;
            --whatsapp: #25d366; --danger: #ef4444;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 30px; }
        header { background: var(--primary); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--accent); }
        .logo { color: white; font-weight: 800; font-size: 1.2rem; }
        .logo span { background: var(--accent); color: var(--primary); padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        .container { max-width: 1400px; margin: 1rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr; gap: 1rem; }
        @media (min-width: 1200px) { .container { grid-template-columns: 1.8fr 1fr; } }
        .card { background: var(--card-bg); border-radius: 12px; padding: 1.2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 1rem; }
        .card-title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; }
        input, select, button { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 0.5rem; font-family: inherit; font-size: 0.9rem; -webkit-appearance: none; appearance: none; box-sizing: border-box; }
        .btn-accent { background: var(--accent); color: var(--primary); border: none; font-weight: 700; cursor: pointer; }
        .btn-success { background: var(--success); color: white; border: none; font-weight: 700; cursor: pointer; }
        .btn-danger { background: var(--danger); color: white; border: none; font-weight: 700; cursor: pointer; }
        .btn-whatsapp { background: var(--whatsapp); color: white; border: none; font-weight: 900; cursor: pointer; margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-small { width: auto; padding: 0.5rem 1rem; font-size: 0.8rem; margin: 0 0.2rem 0.5rem 0; }
        .multi-select-box { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 5px; background: #f8fafc; padding: 0.8rem; border-radius: 8px; border: 1px solid #e2e8f0; }
        .folga-item { font-size: 0.7rem; font-weight: 600; display: flex; align-items: center; gap: 4px; padding: 5px; border: 1px solid #ddd; border-radius: 4px; background: white; }
        .item-intervalo-flex { display: grid; grid-template-columns: 100px 1fr 1fr; gap: 5px; background: #f8fafc; padding: 0.5rem; border-radius: 8px; margin-bottom: 0.5rem; }
        .item-intervalo-flex input, .item-intervalo-flex select { margin: 0; padding: 5px; font-size: 0.75rem; }
        #saida { width: 100%; height: 350px; background: #071724; color: #10b981; padding: 1rem; font-family: 'Consolas', monospace; border-radius: 8px; font-size: 0.8rem; line-height: 1.4; border: none; resize: none; box-sizing: border-box; }
        #loginOverlay { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 2rem; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; }
        .grid-mensal { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .fox-row { background: white; border: 1px solid #e2e8f0; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.65rem; text-align: center; }
        .funcionario-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; background: #f8fafc; margin-bottom: 0.5rem; border-radius: 6px; border-left: 4px solid var(--accent); }
        .funcionario-nome { font-weight: 600; }
        .horario-display { font-size: 0.8rem; color: #64748b; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
        .close-modal { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #64748b; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="margin-bottom:1.5rem; color:#0f172a">FOX<span>CONTROL</span></h2>
        <input type="password" id="pass" placeholder="Senha (123)">
        <button class="btn-accent" onclick="autenticar()" style="background:#0f172a; color:white">Entrar</button>
    </div>
</div>

<!-- Modal Gerenciar Funcionários -->
<div id="modalFuncionarios" class="modal">
    <div class="modal-content">
        <button class="close-modal" onclick="fecharModal('modalFuncionarios')">&times;</button>
        <h3>Gerenciar Funcionários</h3>
        <div style="display: grid; grid-template-columns: 1fr auto; gap: 1rem; margin-bottom: 1rem;">
            <input type="text" id="novoFuncionario" placeholder="Nome do funcionário">
            <button class="btn-success btn-small" onclick="adicionarFuncionario()">Adicionar</button>
        </div>
        <div id="listaFuncionarios"></div>
        <h4 style="margin: 1.5rem 0 0.5rem 0; color: #64748b;">Horários Personalizáveis</h4>
        <div style="display: grid; grid-template-columns: 1fr auto; gap: 1rem; margin-bottom: 1rem;">
            <input type="text" id="novoHorario" placeholder="Ex: 11:00-12:00">
            <button class="btn-accent btn-small" onclick="adicionarHorario()">Adicionar</button>
        </div>
        <div id="listaHorarios" style="max-height: 200px; overflow-y: auto;"></div>
        <div style="margin-top: 1.5rem; text-align: center;">
            <button class="btn-success" onclick="salvarDados()">💾 Salvar Tudo</button>
            <button class="btn-danger btn-small" onclick="limparTudo()" style="margin-left: 1rem;">Limpar Tudo</button>
        </div>
    </div>
</div>

<header>
    <div class="logo">FOX <span>CONTROL</span></div>
    <div>
        <button class="btn-accent btn-small" onclick="abrirModal('modalFuncionarios')" title="Gerenciar">👥 Gerenciar</button>
        <span style="color:white; font-size: 0.7rem; margin-left: 1rem;" id="clock"></span>
    </div>
</header>

<div class="container">
    <div class="left">
        <div class="card">
            <div class="card-title">Distribuição</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                <input type="date" id="dataEscala" onchange="atualizarInterface()">
                <select id="turno" onchange="atualizarInterface()">
                    <option value="Manhã">Manhã</option>
                    <option value="Tarde">Tarde</option>
                </select>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                <select id="area1"></select><select id="area2"></select>
                <select id="area3"></select><select id="apoioNome"></select>
            </div>
            <div style="font-size: 0.7rem; font-weight: 800; color: #64748b; margin: 10px 0 5px;">FOLGAS</div>
            <div class="multi-select-box" id="listaFolgasCheck"></div>
        </div>

        <div class="card">
            <div class="card-title">Lista de Funcionários</div>
            <div id="listaFuncionariosPreview"></div>
        </div>

        <div class="card">
            <div class="card-title">Intervalos</div>
            <div id="listaIntervalos"></div>
        </div>

        <div class="card">
            <div class="card-title">Agenda (Mensal)</div>
            <div class="grid-mensal" id="gridFox"></div>
        </div>
    </div>

    <div class="right">
        <div class="card">
            <div class="card-title">Preview WhatsApp</div>
            <textarea id="saida" readonly></textarea>
            <button class="btn-accent" style="margin-top:10px" onclick="gerarTexto()">1. Gerar Escala</button>
            <button id="btnCopiar" class="btn-success" onclick="copiar()">2. Copiar Texto</button>
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
                </svg>
                ENVIAR WHATSAPP
            </button>
        </div>
    </div>
</div>

<script>
    // Dados persistentes no localStorage
    let colaboradores = JSON.parse(localStorage.getItem('fox_colaboradores')) || 
        ["Cesinha", "Bruno", "Emerson", "Inácio", "Ermano", "Fagno", "Daniela", "Reinaldo", "Ney", "Willians", "Moises", "Marcos"];
    
    let horariosPorTurno = JSON.parse(localStorage.getItem('fox_horarios')) || {
        "Manhã": ["11:00-12:00", "12:00-13:00", "14:00-15:00", "15:00-16:00"],
        "Tarde": ["16:00-17:00", "17:00-18:00", "18:00-19:00", "19:00-20:00"]
    };

    function autenticar() {
        if(document.getElementById('pass').value === "123") {
            document.getElementById('loginOverlay').style.display = 'none';
            carregarDados();
            init();
        } else {
            alert("Senha: 123");
        }
    }

    function abrirModal(modalId) {
        document.getElementById(modalId).style.display = 'flex';
        renderModalContent();
    }

    function fecharModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    function renderModalContent() {
        // Lista de funcionários
        const listaFunc = document.getElementById('listaFuncionarios');
        listaFunc.innerHTML = colaboradores.map((nome, i) => `
            <div class="funcionario-item">
                <div>
                    <div class="funcionario-nome">${nome}</div>
                </div>
                <div>
                    <button class="btn-danger btn-small" onclick="removerFuncionario(${i})" title="Remover">🗑️</button>
                </div>
            </div>
        `).join('');

        // Lista de horários
        const listaHor = document.getElementById('listaHorarios');
        const horariosFlat = [...horariosPorTurno.Manhã, ...horariosPorTurno.Tarde];
        listaHor.innerHTML = horariosFlat.map((horario, i) => `
            <div class="funcionario-item">
                <div class="horario-display">${horario}</div>
                <button class="btn-danger btn-small" onclick="removerHorario('${horario}')" title="Remover">🗑️</button>
            </div>
        `).join('');
    }

    function adicionarFuncionario() {
        const nome = document.getElementById('novoFuncionario').value.trim();
        if (nome && !colaboradores.includes(nome)) {
            colaboradores.push(nome);
            document.getElementById('novoFuncionario').value = '';
            renderModalContent();
            atualizarInterface();
        }
    }

    function removerFuncionario(index) {
        if (confirm(`Remover ${colaboradores[index]}?`)) {
            colaboradores.splice(index, 1);
            renderModalContent();
            atualizarInterface();
        }
    }

    function adicionarHorario() {
        const horario = document.getElementById('novoHorario').value.trim();
        if (horario) {
            const turno = document.getElementById('turno').value || 'Manhã';
            if (!horariosPorTurno[turno].includes(horario)) {
                horariosPorTurno[turno].push(horario);
                document.getElementById('novoHorario').value = '';
                renderModalContent();
                if (document.getElementById('turno').value === turno) {
                    renderIntervalos();
                }
            }
        }
    }

    function removerHorario(horario) {
        if (confirm(`Remover horário ${horario}?`)) {
            Object.keys(horariosPorTurno).forEach(turno => {
                const index = horariosPorTurno[turno].indexOf(horario);
                if (index > -1) horariosPorTurno[turno].splice(index, 1);
            });
            renderModalContent();
            renderIntervalos();
        }
    }

    function salvarDados() {
        localStorage.setItem('fox_colaboradores', JSON.stringify(colaboradores));
        localStorage.setItem('fox_horarios', JSON.stringify(horariosPorTurno));
        alert('✅ Dados salvos com sucesso!');
        fecharModal('modalFuncionarios');
    }

    function limparTudo() {
        if (confirm('Tem certeza que deseja limpar TODOS os dados?')) {
            localStorage.removeItem('fox_colaboradores');
            localStorage.removeItem('fox_horarios');
            location.reload();
        }
    }

    function carregarDados() {
        const salvos = JSON.parse(localStorage.getItem('fox_colaboradores'));
        if (savos) colaboradores = salvos;
        
        const horariosSalvos = JSON.parse(localStorage.getItem('fox_horarios'));
        if (horariosSalvos) horariosPorTurno = horariosSalvos;
    }

    function atualizarInterface() {
        ["area1", "area2", "area3", "apoioNome"].forEach(id => {
            const el = document.getElementById(id);
            const atual = el.value;
            el.innerHTML = `<option value="">-- ${id.toUpperCase()} --</option>`;
            colaboradores.forEach(c => el.innerHTML += `<option value="${c}" ${c === atual ? 'selected' : ''}>${c}</option>`);
        });

        const folgaContainer = document.getElementById('listaFolgasCheck');
        folgaContainer.innerHTML = "";
        colaboradores.forEach(c => {
            folgaContainer.innerHTML += `<label class="folga-item"><input type="checkbox" class="check-folga" value="${c}"> ${c}</label>`;
        });

        // Preview lista funcionários
        document.getElementById('listaFuncionariosPreview').innerHTML = 
            colaboradores.map(c => `<div style="padding: 0.5rem; font-size: 0.8rem; border-bottom: 1px solid #e2e8f0;">👤 ${c}</div>`).join('');

        renderIntervalos();
    }

    function renderIntervalos() {
        const turno = document.getElementById('turno').value;
        const container = document.getElementById('listaIntervalos');
        container.innerHTML = "";
        const horas = horariosPorTurno[turno] || [];
        horas.forEach(h => {
            container.innerHTML += `<div class="item-intervalo-flex">
                <input type="text" value="${h}" readonly>
                <select class="int-sai">
                    <option value="">Sai</option>
                    ${colaboradores.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
                <select class="int-rende">
                    <option value="">Revezar</option>
                    ${colaboradores.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
            </div>`;
        });
    }

    function gerarTexto() {
        const dataRaw = document.getElementById('dataEscala').value;
        if(!dataRaw) return alert("Selecione a data!");
        const dataObj = new Date(dataRaw + 'T00:00:00');
        const dias = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
        
        const dataBase = new Date('2026-02-03T00:00:00');
        const diff = Math.floor((dataObj - dataBase) / 86400000);
        const plantao = (diff % 2 === 0) ? `*Ney* - Moto\n*Willians* - Carrinho` : `*Moises* - Moto\n*Marcos* - Carrinho`;

        const folgas = Array.from(document.querySelectorAll('.check-folga:checked')).map(cb => cb.value).join(', ') || "---";
        let intTxt = "";
        document.querySelectorAll('.item-intervalo-flex').forEach(l => {
            const s = l.querySelector('.int-sai').value;
            const r = l.querySelector('.int-rende').value || "Revezar";
            if(s) intTxt += `${l.querySelector('input').value} - ${s} / ${r}\n`;
        });

        const txt = `Bom dia!\n*Distribuição Fox 5*\n${dataObj.toLocaleDateString('pt-BR')} ${dias[dataObj.getDay()]}\n\n*Área 01* - ${document.getElementById('area1').value || "---"}\n*Área 02* - ${document.getElementById('area2').value || "---"}\n*Área 03* - ${document.getElementById('area3').value || "---"}\n*Apoio* - ${document.getElementById('apoioNome').value || "---"}\n*Folga* - ${folgas}\n\n${plantao}\n\n*Intervalos:*\n${intTxt}\nBom trabalho! 🚀`;
        document.getElementById('saida').value = txt;
    }

    function copiar() {
        const s = document.getElementById('saida');
        if(!s.value) return alert("Gere a escala!");
        s.select();
        s.setSelectionRange(0, 99999); 
        navigator.clipboard.writeText(s.value);
        document.getElementById('btnCopiar').innerText = "✓ COPIADO!";
        setTimeout(() => document.getElementById('btnCopiar').innerText = "2. COPIAR TEXTO", 2000);
    }

    function enviarWhatsApp() {
        const txt = document.getElementById('saida').value;
        if(!txt) return alert("Gere a escala primeiro!");
        
        const wpUrl = "whatsapp://send?text=" + encodeURIComponent(txt);
        const fallbackUrl = "https://api.whatsapp.com/send?text=" + encodeURIComponent(txt);
        
        window.location.href = wpUrl;
        setTimeout(() => {
            window.open(fallbackUrl, '_blank');
        }, 500);
    }

    function init() {
        document.getElementById('dataEscala').valueAsDate = new Date();
        const grid = document.getElementById('gridFox');
        colaboradores.slice(0,8).forEach(n => grid.innerHTML += `<div class="fox-row"><span>${n}</span></div>`);
        atualizarInterface();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
    }

    // Fechar modal clicando fora
    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal')) {
            e.target.style.display = 'none';
        }
    });

    // Enter para adicionar
    document.addEventListener('keypress', (e) => {
        if (e.target.id === 'novoFuncionario' && e.key === 'Enter') adicionarFuncionario();
        if (e.target.id === 'novoHorario' && e.key === 'Enter') adicionarHorario();
    });
</script>
</body>
</html>
