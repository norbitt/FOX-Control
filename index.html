<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊 FOX CONTROL | Gerenciador Completo v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0f172a; --accent: #fbbf24; --bg: #f1f5f9; 
            --card-bg: #ffffff; --text: #1e293b; --success: #10b981;
            --whatsapp: #25d366; --danger: #ef4444; --suporte: #3b82f6;
            --info: #06b6d4; --warning: #f59e0b;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--bg) 0%, #e2e8f0 100%); color: var(--text); min-height: 100vh; padding-bottom: 30px; }
        header { background: linear-gradient(135deg, var(--primary), #1e293b); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--accent); box-shadow: 0 4px 20px rgba(251,191,36,0.3); }
        .logo { color: white; font-weight: 800; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .logo span { background: var(--accent); color: var(--primary); padding: 4px 8px; border-radius: 6px; font-size: 0.9rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .container { max-width: 1400px; margin: 1.5rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 1200px) { .container { grid-template-columns: 1.8fr 1fr; } }
        .card { background: var(--card-bg); border-radius: 16px; padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 1rem; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent), var(--success)); }
        .card-title { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .input-group { position: relative; margin-bottom: 1rem; }
        input, select, textarea { width: 100%; padding: 0.9rem 1rem; border-radius: 10px; border: 2px solid #e2e8f0; font-family: inherit; font-size: 0.95rem; transition: all 0.3s ease; background: #fafbfc; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(251,191,36,0.1); background: white; }
        .btn { padding: 0.9rem 1.5rem; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .btn-accent { background: linear-gradient(135deg, var(--accent), #f59e0b); color: var(--primary); }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); color: white; }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; }
        .btn-whatsapp { background: linear-gradient(135deg, var(--whatsapp), #20b156); color: white; font-weight: 900; width: 100%; justify-content: center; margin-top: 1rem; }
        .btn-small { width: auto; padding: 0.6rem 1rem; font-size: 0.8rem; margin: 0 0.3rem 0.5rem 0; }
        .btn-suporte { background: linear-gradient(135deg, var(--suporte), #2563eb); color: white; }
        .multi-select-box { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; background: #f8fafc; padding: 1rem; border-radius: 10px; border: 2px solid #e2e8f0; max-height: 200px; overflow-y: auto; }
        .folga-item { font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 6px; padding: 8px; border: 2px solid transparent; border-radius: 8px; background: white; cursor: pointer; transition: all 0.2s; }
        .folga-item:hover { border-color: var(--warning); transform: translateY(-1px); }
        .folga-item input:checked + span { color: var(--danger); font-weight: 800; }
        .suporte-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; align-items: center; }
        .item-intervalo { display: grid; grid-template-columns: 120px 1fr 1fr; gap: 8px; background: #f8fafc; padding: 0.8rem; border-radius: 10px; margin-bottom: 0.8rem; border: 1px solid #e2e8f0; }
        .item-intervalo input, .item-intervalo select { margin: 0; padding: 0.6rem; font-size: 0.85rem; }
        #saida { width: 100%; height: 400px; background: #0a0f1a; color: #10b981; padding: 1.5rem; font-family: 'Consolas', monospace; border-radius: 12px; font-size: 0.85rem; line-height: 1.5; border: 2px solid #10b981; resize: vertical; transition: all 0.3s; }
        #saida:focus { box-shadow: 0 0 0 3px rgba(16,185,129,0.3); }
        #loginOverlay { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary), rgba(15,23,42,0.95)); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .login-card { background: rgba(255,255,255,0.95); padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.3); backdrop-filter: blur(20px); }
        .grid-mensal { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; max-height: 300px; overflow-y: auto; }
        .fox-row { background: white; border: 2px solid #e2e8f0; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.75rem; text-align: center; transition: all 0.2s; position: relative; }
        .fox-row:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(251,191,36,0.3); }
        .fox-row.ativo { border-color: var(--success); background: linear-gradient(135deg, var(--success), #059669); color: white; }
        .status-badge { position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; color: white; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 2.5rem; border-radius: 20px; width: 95%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.2rem; }
        .close-modal { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; font-size: 2rem; cursor: pointer; color: #64748b; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .close-modal:hover { background: #f1f5f9; color: var(--danger); transform: rotate(90deg); }
        .toast { position: fixed; top: 20px; right: 20px; padding: 1rem 1.5rem; border-radius: 12px; color: white; font-weight: 600; z-index: 10001; transform: translateX(400px); transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .toast.show { transform: translateX(0); }
        .section-divider { height: 1px; background: linear-gradient(90deg, transparent, #e2e8f0, transparent); margin: 2rem 0; }
        @media (max-width: 768px) { 
            .container { grid-template-columns: 1fr; } 
            .form-grid { grid-template-columns: 1fr; }
            header { padding: 1rem; }
            .card { padding: 1.2rem; }
        }
        .loading { opacity: 0.7; pointer-events: none; }
        .copied { animation: bounce 0.6s; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <div style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--accent);"><i class="fas fa-fox"></i></div>
        <h2 style="margin-bottom:2rem; color:var(--primary); font-weight: 800;">FOX<span style="color:var(--accent); font-size:0.9em;">CONTROL</span></h2>
        <div class="input-group">
            <input type="password" id="pass" placeholder="🔑 Digite a senha (123)" style="text-align:center; font-size:1.2rem; padding:1.2rem;">
        </div>
        <button class="btn-accent" onclick="autenticar()" style="width:100%; padding:1.2rem; font-size:1.1rem;">
            <i class="fas fa-sign-in-alt"></i> ACESSAR SISTEMA
        </button>
        <div style="margin-top:1rem; font-size:0.8rem; color:#64748b;">Sistema de Gestão Fox 5</div>
    </div>
</div>

<!-- Modal Gerenciar -->
<div id="modalGerenciar" class="modal">
    <div class="modal-content">
        <button class="close-modal" onclick="fecharModal('modalGerenciar')"><i class="fas fa-times"></i></button>
        <h3><i class="fas fa-users-cog"></i> Gerenciar Fox Control</h3>
        <div class="form-grid">
            <div>
                <h4>👥 Funcionários</h4>
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <input type="text" id="novoFuncionario" placeholder="Novo funcionário">
                    <button class="btn-success btn-small" onclick="adicionarFuncionario()">
                        <i class="fas fa-plus"></i> Adicionar
                    </button>
                </div>
                <div id="listaFuncionarios" style="max-height: 250px; overflow-y: auto;"></div>
            </div>
            <div>
                <h4>⏰ Horários</h4>
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <input type="text" id="novoHorario" placeholder="Ex: 15h-16h">
                    <button class="btn-accent btn-small" onclick="adicionarHorario()">
                        <i class="fas fa-plus"></i> Horário
                    </button>
                </div>
                <div id="listaHorarios" style="max-height: 250px; overflow-y: auto;"></div>
            </div>
        </div>
        <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
            <button class="btn-success" onclick="salvarDados()">
                <i class="fas fa-save"></i> Salvar Tudo
            </button>
            <button class="btn-danger btn-small" onclick="limparTudo()">
                <i class="fas fa-trash"></i> Resetar
            </button>
            <button class="btn-suporte btn-small" onclick="exportarDados()">
                <i class="fas fa-download"></i> Backup
            </button>
        </div>
    </div>
</div>

<header>
    <div class="logo">
        <i class="fas fa-fox" style="font-size: 1.8rem; color: var(--accent);"></i>
        FOX <span>Control v2.0</span>
    </div>
    <div class="header-right">
        <button class="btn-accent btn-small" onclick="abrirModal('modalGerenciar')" title="Gerenciar">
            <i class="fas fa-cog"></i> Gerenciar
        </button>
        <div style="color:white; font-size: 0.85rem; font-weight: 600; background: rgba(251,191,36,0.3); padding: 0.5rem 1rem; border-radius: 20px;" id="clock"></div>
    </div>
</header>

<div class="container">
    <!-- ESQUERDA - FORMULÁRIOS -->
    <div class="left">
        <div class="card">
            <div class="card-title"><i class="fas fa-calendar-day"></i> Configuração da Escala</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:1.2rem;">
                <div class="input-group">
                    <label style="font-size:0.8rem; font-weight:600; margin-bottom:0.3rem; display:block;">📅 Data</label>
                    <input type="date" id="dataEscala" onchange="atualizarInterface()">
                </div>
                <div class="input-group">
                    <label style="font-size:0.8rem; font-weight:600; margin-bottom:0.3rem; display:block;">🌅 Turno</label>
                    <select id="turno" onchange="atualizarInterface()">
                        <option value="tarde">Tarde (Tickets 19h)</option>
                        <option value="manha">Manhã (Tickets 14h)</option>
                    </select>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:1.2rem;">
                <select id="area01" class="input-group"><option>-- Área 01 --</option></select>
                <select id="area02" class="input-group"><option>-- Área 02 --</option></select>
                <select id="area03" class="input-group"><option>-- Área 03 --</option></select>
            </div>

            <!-- SUPORTE OBRIGATÓRIO -->
            <div class="card" style="margin:1rem 0; padding:1.2rem;">
                <div class="card-title"><i class="fas fa-hard-hat"></i> Suporte (Obrigatório)</div>
                <div class="suporte-grid">
                    <select id="suporteTipo" onchange="atualizarSuporte()" style="grid-column:1">
                        <option value="Instituto">🏫 Instituto</option>
                        <option value="Lagoa">🏞️ Lagoa</option>
                    </select>
                    <select id="suporteNome" class="input-group"><option>-- Nome Suporte --</option></select>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:1.2rem;">
                <div class="input-group">
                    <label style="font-size:0.8rem; font-weight:600; margin-bottom:0.3rem;">🚗 Carrinho/Pf's</label>
                    <select id="carrinho"></select>
                </div>
                <div class="input-group">
                    <label style="font-size:0.8rem; font-weight:600; margin-bottom:0.3rem;">🎫 Retira Tickets</label>
                    <select id="tickets"></select>
                </div>
            </div>

            <div class="card-title" style="margin-top:1.5rem;"><i class="fas fa-ban"></i> Folgas</div>
            <div class="multi-select-box" id="listaFolgasCheck"></div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-list"></i> Intervalos Automáticos</div>
            <div id="listaIntervalos"></div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-th-large"></i> Agenda Rápida</div>
            <div class="grid-mensal" id="gridFox"></div>
        </div>
    </div>

    <!-- DIREITA - PREVIEW -->
    <div class="right">
        <div class="card" style="height: fit-content;">
            <div class="card-title"><i class="fab fa-whatsapp"></i> Preview WhatsApp <span style="font-size:0.7rem; color:var(--success);">(Formato Exato)</span></div>
            <textarea id="saida" readonly placeholder="Clique 'Gerar Escala' para preview..."></textarea>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top:1.2rem;">
                <button class="btn-accent" onclick="gerarTexto()">
                    <i class="fas fa-magic"></i> 1. Gerar Escala
                </button>
                <button id="btnCopiar" class="btn-success" onclick="copiar()">
                    <i class="fas fa-copy"></i> 2. Copiar
                </button>
            </div>
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">
                <i class="fab fa-whatsapp"></i> 📱 ENVIAR WHATSAPP
            </button>
        </div>
    </div>
</div>

<script>
    // Dados persistentes
    let colaboradores = JSON.parse(localStorage.getItem('fox_colaboradores')) || 
        ["Vinícius", "Roni", "Bruno", "Ermano", "Ney", "Williams", "Reinaldo", "Guilherme"];
    
    let horariosPorTurno = JSON.parse(localStorage.getItem('fox_horarios')) || {
        "manha": ["14h às 15h", "15h às 16h"],
        "tarde": ["15h às 16h", "17h às 18h", "18h às 19h", "19h às 20h"]
    };

    function mostrarToast(mensagem, tipo = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${tipo}`;
        toast.style.background = tipo === 'success' ? 'var(--success)' : 
                                tipo === 'error' ? 'var(--danger)' : 'var(--accent)';
        toast.textContent = mensagem;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 100);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function autenticar() {
        if(document.getElementById('pass').value === "123") {
            document.getElementById('loginOverlay').style.display = 'none';
            carregarDados();
            init();
            mostrarToast('✅ Bem-vindo ao FOX CONTROL v2.0!', 'success');
        } else {
            mostrarToast('❌ Senha incorreta! (123)', 'error');
            document.getElementById('pass').value = '';
            document.getElementById('pass').focus();
        }
    }

    function formatarData(dataStr) {
        const data = new Date(dataStr);
        const diaSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'][data.getDay()];
        const dia = data.getDate().toString().padStart(2, '0');
        const mes = (data.getMonth() + 1).toString().padStart(2, '0');
        const ano = data.getFullYear();
        return `${dia}/${mes}/${ano} ${diaSemana}`;
    }

    function atualizarInterface() {
        const ids = ['area01', 'area02', 'area03', 'suporteNome', 'carrinho', 'tickets'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            const atual = el.value;
            el.innerHTML = `<option value="">-- Selecione ${id.replace(/\d/g,'')} --</option>`;
            colaboradores.filter(c => !['Ney', 'Williams'].includes(c)).forEach(c => {
                el.innerHTML += `<option value="${c}" ${c === atual ? 'selected' : ''}>${c}</option>`;
            });
        });

        // Suporte sempre disponível
        document.getElementById('suporteNome').innerHTML += '<option value="Ney">Ney</option>';

        // Carrinho e Tickets
        ['carrinho', 'tickets'].forEach(id => {
            const el = document.getElementById(id);
            el.innerHTML += '<option value="Williams">Williams</option>';
        });

        // Folgas
        const folgaContainer = document.getElementById('listaFolgasCheck');
        folgaContainer.innerHTML = colaboradores.map(c => `
            <label class="folga-item">
                <input type="checkbox" class="check-folga" value="${c}">
                <span>${c}</span>
            </label>
        `).join('');

        renderIntervalos();
        renderAgenda();
    }

    function atualizarSuporte() {
        const tipo = document.getElementById('suporteTipo').value;
        document.getElementById('suporteTipo').innerHTML = `
            <option value="Instituto">🏫 Instituto</option>
            <option value="Lagoa">🏞️ Lagoa</option>
        `;
        document.getElementById('suporteTipo').value = tipo;
    }

    function renderIntervalos() {
        const turno = document.getElementById('turno').value;
        const container = document.getElementById('listaIntervalos');
        const horas = horariosPorTurno[turno] || [];
        container.innerHTML = horas.map(h => `
            <div class="item-intervalo">
                <input type="text" value="${h}" readonly style="font-weight:600;">
                <select class="int-sai">
                    <option value="">Sai</option>
                    ${colaboradores.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
                <select class="int-rende">
                    <option value="Revezar">Revezar</option>
                    ${colaboradores.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
            </div>
        `).join('');
    }

    function renderAgenda() {
        const grid = document.getElementById('gridFox');
        grid.innerHTML = colaboradores.slice(0,12).map(nome => `
            <div class="fox-row" onclick="this.classList.toggle('ativo')" title="${nome}">
                <span>${nome}</span>
                <div class="status-badge" style="display:none;">✓</div>
            </div>
        `).join('');
    }

    function gerarTexto() {
        const data = document.getElementById('dataEscala').value;
        if(!data) return mostrarToast('❌ Selecione a data primeiro!', 'error');

        const turno = document.getElementById('turno').value;
        const horaTickets = turno === 'tarde' ? '19h' : '14h';
        
        const area01 = document.getElementById('area01').value || '---';
        const area02 = document.getElementById('area02').value || '---';
        const area03 = document.getElementById('area03').value || '---';
        const suporteTipo = document.getElementById('suporteTipo').value;
        const suporteNome = document.getElementById('suporteNome').value || '---';
        const carrinho = document.getElementById('carrinho').value || '---';
        const tickets = document.getElementById('tickets').value || '---';
        
        const folgas = Array.from(document.querySelectorAll('.check-folga:checked'))
            .map(cb => cb.value).join(', ') || '---';

        let intervalosTxt = '';
        document.querySelectorAll('.item-intervalo').forEach(item => {
            const hora = item.querySelector('input').value;
            const sai = item.querySelector('.int-sai').value;
            const rende = item.querySelector('.int-rende').value || 'Revezar';
            if(sai) intervalosTxt += `${hora} - ${sai}/${rende}\n`;
        });

        const texto = `Boa tarde!
Distribuição Fox 5
${formatarData(data)} 

Área 01 - ${area01} 
Área 02 - ${area02}
Área 03 - ${area03} 

Folga ( ${folgas})

${suporteNome}  - Suporte ${suporteTipo}

${carrinho} - Carrinho de passageiros/Pf'S

 *Recolhimento dos tickets das saídas ${horaTickets} 
( ${tickets} )

Intervalos:

${intervalosTxt || '---'}

Bom trabalho! 🚀`;

        document.getElementById('saida').value = texto;
        mostrarToast('✅ Escala gerada com sucesso!', 'success');
    }

    function copiar() {
        const saida = document.getElementById('saida');
        if(!saida.value.trim()) return mostrarToast('❌ Gere a escala primeiro!', 'error');
        
        navigator.clipboard.writeText(saida.value).then(() => {
            const btn = document.getElementById('btnCopiar');
            btn.innerHTML = '<i class="fas fa-check"></i> ✓ COPIADO!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-copy"></i> 2. Copiar';
                btn.classList.remove('copied');
            }, 2000);
        });
    }

    function enviarWhatsApp() {
        const txt = document.getElementById('saida').value.trim();
        if(!txt) return mostrarToast('❌ Gere a escala primeiro!', 'error');
        
        const wpUrl = `https://wa.me/?text=${encodeURIComponent(txt)}`;
        window.open(wpUrl, '_blank');
        mostrarToast('📱 WhatsApp aberto!', 'success');
    }

    // Modal Functions
    function abrirModal(modalId) { document.getElementById(modalId).style.display = 'flex'; renderModalContent(); }
    function fecharModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

    function renderModalContent() {
        document.getElementById('listaFuncionarios').innerHTML = 
            colaboradores.map((nome, i) => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:0.8rem; background:#f8fafc; margin-bottom:0.5rem; border-radius:8px;">
                    <span style="font-weight:600;">${nome}</span>
                    <button class="btn-danger btn-small" onclick="removerFuncionario(${i})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');

        const horariosFlat = Object.values(horariosPorTurno).flat();
        document.getElementById('listaHorarios').innerHTML = 
            horariosFlat.map(h => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:0.8rem; background:#f8fafc; margin-bottom:0.5rem; border-radius:8px;">
                    <span style="font-family:monospace;">${h}</span>
                    <button class="btn-danger btn-small" onclick="removerHorario('${h}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
    }

    function adicionarFuncionario() {
        const nome = document.getElementById('novoFuncionario').value.trim();
        if(nome && !colaboradores.includes(nome)) {
            colaboradores.push(nome);
            document.getElementById('novoFuncionario').value = '';
            renderModalContent();
            atualizarInterface();
            mostrarToast(`✅ ${nome} adicionado!`);
        }
    }

    function removerFuncionario(index) {
        if(confirm(`Remover ${colaboradores[index]}?`)) {
            colaboradores.splice(index, 1);
            renderModalContent();
            atualizarInterface();
            mostrarToast('✅ Funcionário removido!');
        }
    }

    function adicionarHorario() {
        const horario = document.getElementById('novoHorario').value.trim();
        if(horario) {
            const turno = document.getElementById('turno').value || 'tarde';
            if(!horariosPorTurno[turno].includes(horario)) {
                horariosPorTurno[turno].push(horario);
                document.getElementById('novoHorario').value = '';
                renderModalContent();
                renderIntervalos();
                mostrarToast('✅ Horário adicionado!');
            }
        }
    }

    function removerHorario(horario) {
        if(confirm(`Remover ${horario}?`)) {
            Object.keys(horariosPorTurno).forEach(turno => {
                const idx = horariosPorTurno[turno].indexOf(horario);
                if(idx > -1) horariosPorTurno[turno].splice(idx, 1);
            });
            renderModalContent();
            renderIntervalos();
            mostrarToast('✅ Horário removido!');
        }
    }

    function salvarDados() {
        localStorage.setItem('fox_colaboradores', JSON.stringify(colaboradores));
        localStorage.setItem('fox_horarios', JSON.stringify(horariosPorTurno));
        mostrarToast('💾 Todos os dados salvos!', 'success');
        fecharModal('modalGerenciar');
    }

    function limparTudo() {
        if(confirm('⚠️ Resetar TODOS os dados?')) {
            localStorage.clear();
            location.reload();
        }
    }

    function exportarDados() {
        const dados = { colaboradores, horariosPorTurno, data: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(dados, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `fox-control-backup-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        mostrarToast('📥 Backup baixado!');
    }

    function carregarDados() {
        const salvos = localStorage.getItem('fox_colaboradores');
        if(salvos) colaboradores = JSON.parse(salvos);
        const horarios = localStorage.getItem('fox_horarios');
        if(horarios) horariosPorTurno = JSON.parse(horarios);
    }

    function init() {
        document.getElementById('dataEscala').valueAsDate = new Date();
        atualizarInterface();
        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleString('pt-BR');
        }, 1000);

        // Fechar modais
        document.addEventListener('click', (e) => {
            if(e.target.classList.contains('modal')) fecharModal('modalGerenciar');
        });

        // Enter para adicionar
        document.addEventListener('keypress', (e) => {
            if(e.target.id === 'novoFuncionario' && e.key === 'Enter') adicionarFuncionario();
            if(e.target.id === 'novoHorario' && e.key === 'Enter') adicionarHorario();
        });
    }

    // Auto-gerar na carga
    window.onload = () => {
        document.getElementById('pass').focus();
    };
</script>
</body>
</html>
